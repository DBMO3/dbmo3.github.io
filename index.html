<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            width: 100%;
        }

        /* Slideshow Styles */
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            filter: brightness(0.35);
            animation: slideshowAnimation 24s linear infinite;
        }

        .slide:nth-child(1) { background-image: url('bg1.png'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('bg2.png'); animation-delay: 8s; }
        .slide:nth-child(3) { background-image: url('bg3.png'); animation-delay: 16s; }

        @keyframes slideshowAnimation {
            0% { opacity: 0; transform: scale(1.1); }
            5% { opacity: 1; }
            33% { opacity: 1; }
            38% { opacity: 0; transform: scale(1); }
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* Modal Styles */
        #modal-terms {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        #modal-terms.active {
            display: flex;
            opacity: 1;
        }

        .modal-body {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            background: rgba(20, 20, 20, 0.95);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .service-card {
            cursor: pointer;
            padding: 2.5rem 1.5rem;
            border-radius: 2rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .payment-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        @media (max-width: 640px) {
            h1 { font-size: 3.5rem !important; }
            .service-card { padding: 2rem 1rem; }
            .modal-body { padding: 2rem !important; border-radius: 2rem !important; }
        }
    </style>
</head>

        function decodeStr(str) {
            try {
                const binary = atob(str);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const decoded = new TextDecoder().decode(bytes);
                return Array.from(decoded).reverse().join('');
            } catch (e) { return "Error."; }
        }

        const modal = document.getElementById('modal-terms');
        const modalContent = document.getElementById('modal-content');
        const contactBtn = document.getElementById('contact-btn');
        const checkbox = document.getElementById('accept-terms');
        const checkIcon = document.getElementById('check-icon');

        function openService(type) {
            modalContent.innerText = decodeStr(strings[type]);
            checkbox.checked = false;
            contactBtn.disabled = true;
            checkIcon.classList.add('hidden');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        checkbox.addEventListener('change', (e) => {
            contactBtn.disabled = !e.target.checked;
            if (e.target.checked) checkIcon.classList.remove('hidden');
            else checkIcon.classList.add('hidden');
        });

        contactBtn.addEventListener('click', () => {
            if (checkbox.checked) {
                window.open(decodeStr(strings.wa), '_blank');
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
        });
